<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vasuki AI — Intelligent Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #030407;
  --surface: #080B12;
  --card: #0D1120;
  --card2: #111827;
  --border: rgba(96,165,250,0.1);
  --border2: rgba(96,165,250,0.22);
  --cyan: #60A5FA;
  --cyan2: #3B82F6;
  --cyan3: #93C5FD;
  --gold: #FBBF24;
  --gold2: #F59E0B;
  --white: #F0F4FF;
  --muted: #4B5563;
  --muted2: #6B7280;
  --muted3: #9CA3AF;
  --green: #10B981;
  --red: #EF4444;
  --snake: #34D399;
  --purple: #818CF8;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── NOISE OVERLAY ── */
body::before {
  content:'';
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  opacity: 0.4;
}

/* ── AMBIENT GLOW BG ── */
.ambient {
  position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;
}
.ambient-blob {
  position:absolute; border-radius:50%; filter:blur(120px); opacity:0.07;
  animation: blobDrift 18s ease-in-out infinite alternate;
}
.amb1 { width:600px; height:600px; background:#3B82F6; top:-200px; left:-100px; animation-delay:0s; }
.amb2 { width:500px; height:500px; background:#FBBF24; bottom:-150px; right:-100px; animation-delay:-6s; }
.amb3 { width:400px; height:400px; background:#818CF8; top:40%; left:40%; animation-delay:-12s; opacity:0.04; }
@keyframes blobDrift { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(60px,40px) scale(1.15)} }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(96,165,250,0.25); border-radius:99px; }

/* ══════════════════════════════════════
   NAV
══════════════════════════════════════ */
nav {
  position:fixed; top:0; left:0; right:0; z-index:200;
  height:66px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 36px;
  background:rgba(3,4,7,0.8);
  backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
}

.nav-logo { display:flex; align-items:center; gap:14px; cursor:pointer; text-decoration:none; }
.vasuki-logo-mark {
  width:40px; height:40px; position:relative;
  display:flex; align-items:center; justify-content:center;
}
.vasuki-logo-mark svg { width:40px; height:40px; }

.logo-wordmark { display:flex; flex-direction:column; }
.logo-name {
  font-family:'Cinzel', serif;
  font-size:18px; font-weight:700;
  letter-spacing:4px;
  background:linear-gradient(95deg, var(--cyan3) 0%, var(--cyan) 40%, var(--gold) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1.1;
}
.logo-tagline { font-size:8.5px; color:var(--muted2); letter-spacing:3.5px; text-transform:uppercase; }

.nav-center { display:flex; gap:4px; }
.nav-link {
  font-size:13px; color:var(--muted3); padding:8px 18px;
  border-radius:8px; cursor:pointer; transition:all 0.2s;
  letter-spacing:0.3px; border:1px solid transparent;
}
.nav-link:hover { color:var(--white); background:rgba(96,165,250,0.07); }
.nav-link.active { color:var(--cyan); background:rgba(96,165,250,0.08); border-color:rgba(96,165,250,0.15); }

.nav-right { display:flex; align-items:center; gap:12px; }
.nav-status {
  display:flex; align-items:center; gap:7px;
  font-size:12px; color:var(--muted3); letter-spacing:0.3px;
}
.status-dot { width:7px; height:7px; background:var(--green); border-radius:50%; animation:statusPulse 2s infinite; }
@keyframes statusPulse { 0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,0.4)} 50%{box-shadow:0 0 0 5px rgba(16,185,129,0)} }

.nav-cta {
  background:linear-gradient(135deg, var(--cyan2), var(--cyan));
  color:#000; font-weight:600; font-size:13px;
  border:none; border-radius:10px; padding:9px 22px;
  cursor:pointer; font-family:'DM Sans',sans-serif;
  transition:all 0.25s; letter-spacing:0.5px;
  box-shadow:0 2px 20px rgba(59,130,246,0.25);
}
.nav-cta:hover { transform:translateY(-2px); box-shadow:0 6px 28px rgba(59,130,246,0.4); }

/* ══════════════════════════════════════
   PAGES
══════════════════════════════════════ */
.page { display:none; min-height:100vh; padding-top:66px; position:relative; z-index:5; }
.page.active { display:block; }

/* ══════════════════════════════════════
   HOME PAGE
══════════════════════════════════════ */
.hero {
  min-height:calc(100vh - 66px);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:80px 24px 60px;
}

.hero-eyebrow {
  display:inline-flex; align-items:center; gap:8px;
  background:rgba(96,165,250,0.07);
  border:1px solid rgba(96,165,250,0.18);
  border-radius:99px; padding:5px 16px 5px 8px;
  font-size:11.5px; color:var(--cyan3); letter-spacing:1.5px;
  text-transform:uppercase; margin-bottom:36px;
  animation:fadeUp 0.7s ease both;
}
.eyebrow-pill {
  background:rgba(16,185,129,0.15); border:1px solid rgba(16,185,129,0.3);
  border-radius:99px; padding:2px 10px; font-size:10px;
  color:var(--green); letter-spacing:1px;
}

.hero-title {
  font-family:'Cinzel', serif;
  font-size:clamp(48px, 9vw, 96px);
  font-weight:900; line-height:1.0;
  letter-spacing:2px; margin-bottom:28px;
  animation:fadeUp 0.7s ease 0.1s both;
}
.ht-small { display:block; font-size:0.38em; color:var(--muted3); letter-spacing:8px; margin-bottom:8px; font-weight:400; }
.ht-main { display:block; color:var(--white); }
.ht-gradient {
  display:block;
  background:linear-gradient(95deg, var(--cyan3) 0%, var(--cyan) 35%, var(--gold) 70%, var(--gold2) 100%);
  background-size:200%;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:shimmer 4s linear infinite;
}
@keyframes shimmer { 0%{background-position:0%} 100%{background-position:200%} }

.hero-desc {
  font-size:17px; color:var(--muted3); max-width:520px;
  margin:0 auto 52px; line-height:1.8;
  animation:fadeUp 0.7s ease 0.2s both;
}

.hero-btns {
  display:flex; gap:14px; flex-wrap:wrap; justify-content:center;
  animation:fadeUp 0.7s ease 0.3s both; margin-bottom:80px;
}
.btn-primary {
  background:linear-gradient(135deg, var(--cyan2), var(--cyan));
  color:#000; font-weight:700; font-size:14.5px;
  border:none; border-radius:14px; padding:16px 34px;
  cursor:pointer; font-family:'DM Sans',sans-serif;
  transition:all 0.25s; letter-spacing:0.3px;
  display:flex; align-items:center; gap:9px;
  box-shadow:0 4px 30px rgba(59,130,246,0.3);
}
.btn-primary:hover { transform:translateY(-3px); box-shadow:0 10px 40px rgba(59,130,246,0.45); }
.btn-outline {
  background:transparent; color:var(--white);
  border:1px solid var(--border2); font-weight:500; font-size:14.5px;
  border-radius:14px; padding:16px 34px;
  cursor:pointer; font-family:'DM Sans',sans-serif;
  transition:all 0.25s;
  display:flex; align-items:center; gap:9px;
}
.btn-outline:hover { background:rgba(96,165,250,0.07); border-color:var(--cyan); transform:translateY(-3px); }

/* FEATURE GRID */
.features-section { padding:0 24px 100px; max-width:1120px; margin:0 auto; }
.section-label {
  text-align:center; font-size:11px; color:var(--muted2); letter-spacing:4px;
  text-transform:uppercase; margin-bottom:20px;
}
.features-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(240px,1fr)); gap:16px; }
.feat-card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px; padding:28px 24px;
  transition:all 0.3s; position:relative; overflow:hidden;
}
.feat-card::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(circle at 50% 0%, rgba(96,165,250,0.06) 0%, transparent 70%);
  opacity:0; transition:opacity 0.3s;
}
.feat-card:hover { border-color:rgba(96,165,250,0.2); transform:translateY(-5px); }
.feat-card:hover::before { opacity:1; }
.feat-icon-wrap {
  width:46px; height:46px; border-radius:13px;
  display:flex; align-items:center; justify-content:center;
  font-size:20px; margin-bottom:18px;
}
.fi-blue { background:rgba(59,130,246,0.12); border:1px solid rgba(59,130,246,0.2); }
.fi-gold { background:rgba(251,191,36,0.1); border:1px solid rgba(251,191,36,0.2); }
.fi-green { background:rgba(16,185,129,0.1); border:1px solid rgba(16,185,129,0.2); }
.fi-purple { background:rgba(129,140,248,0.1); border:1px solid rgba(129,140,248,0.2); }
.feat-title { font-size:15px; font-weight:600; margin-bottom:8px; letter-spacing:0.2px; }
.feat-desc { font-size:13px; color:var(--muted3); line-height:1.75; }

/* STATS BAR */
.stats-bar {
  display:flex; gap:0; border:1px solid var(--border);
  border-radius:16px; overflow:hidden;
  max-width:800px; margin:0 auto 80px;
  background:var(--card);
}
.stat-item {
  flex:1; text-align:center; padding:22px 16px;
  border-right:1px solid var(--border);
  transition:background 0.2s;
}
.stat-item:last-child { border-right:none; }
.stat-item:hover { background:rgba(96,165,250,0.04); }
.stat-val { font-family:'Cinzel',serif; font-size:26px; font-weight:700; color:var(--cyan3); }
.stat-label { font-size:11px; color:var(--muted2); letter-spacing:1px; text-transform:uppercase; margin-top:4px; }

/* ══════════════════════════════════════
   CHAT PAGE
══════════════════════════════════════ */
.chat-layout {
  display:flex; height:calc(100vh - 66px);
}

/* SIDEBAR */
.chat-sidebar {
  width:264px; flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column;
  padding:20px 14px;
  gap:4px;
}
.sidebar-section-label {
  font-size:10px; color:var(--muted); letter-spacing:2.5px;
  text-transform:uppercase; padding:4px 10px 8px;
}
.new-chat-btn {
  display:flex; align-items:center; gap:10px;
  background:rgba(96,165,250,0.07);
  border:1px dashed rgba(96,165,250,0.22);
  border-radius:11px; padding:11px 14px;
  cursor:pointer; transition:all 0.2s; margin-bottom:8px;
  font-size:13px; color:var(--cyan); font-weight:500;
  font-family:'DM Sans',sans-serif; width:100%;
  letter-spacing:0.2px;
}
.new-chat-btn:hover { background:rgba(96,165,250,0.13); border-color:var(--cyan); }

.mode-btn {
  display:flex; align-items:center; gap:10px;
  padding:9px 12px; border-radius:10px;
  cursor:pointer; transition:all 0.18s; font-size:13px;
  color:var(--muted3); width:100%;
  border:1px solid transparent; margin-bottom:2px;
}
.mode-btn:hover { background:rgba(255,255,255,0.04); color:var(--white); }
.mode-btn.active { background:rgba(96,165,250,0.1); color:var(--cyan); border-color:rgba(96,165,250,0.15); }
.mode-icon { font-size:15px; width:22px; text-align:center; flex-shrink:0; }
.mode-label { flex:1; }
.mode-badge {
  font-size:9px; background:rgba(96,165,250,0.15); color:var(--cyan);
  border-radius:99px; padding:2px 7px; letter-spacing:0.5px;
}

.sidebar-divider { height:1px; background:var(--border); margin:10px 0; }
.sidebar-bottom { margin-top:auto; display:flex; flex-direction:column; gap:8px; }
.api-badge {
  display:flex; align-items:center; gap:8px;
  background:rgba(16,185,129,0.07); border:1px solid rgba(16,185,129,0.15);
  border-radius:10px; padding:10px 12px; font-size:12px; color:var(--snake);
}
.api-badge-dot { width:6px; height:6px; background:var(--snake); border-radius:50%; animation:statusPulse 2s infinite; flex-shrink:0; }

.clear-btn {
  display:flex; align-items:center; justify-content:center; gap:8px;
  background:transparent; border:1px solid var(--border);
  border-radius:10px; padding:9px 14px;
  cursor:pointer; font-size:12px; color:var(--muted3);
  font-family:'DM Sans',sans-serif; transition:all 0.2s; width:100%;
}
.clear-btn:hover { border-color:rgba(239,68,68,0.3); color:var(--red); background:rgba(239,68,68,0.05); }

/* CHAT MAIN */
.chat-main { flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg); }

.chat-topbar {
  height:54px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 24px; flex-shrink:0;
  background:rgba(3,4,7,0.6); backdrop-filter:blur(12px);
}
.topbar-left { display:flex; align-items:center; gap:10px; }
.topbar-mode-icon { font-size:18px; }
.topbar-title { font-size:14px; font-weight:600; letter-spacing:0.2px; }
.topbar-subtitle { font-size:11px; color:var(--muted2); }
.live-badge {
  display:flex; align-items:center; gap:5px;
  background:rgba(16,185,129,0.1); border:1px solid rgba(16,185,129,0.2);
  border-radius:99px; padding:3px 10px; font-size:10.5px; color:var(--green);
}
.live-dot { width:5px; height:5px; background:var(--green); border-radius:50%; animation:statusPulse 1.5s infinite; }

.topbar-actions { display:flex; gap:8px; }
.top-action-btn {
  background:transparent; border:1px solid var(--border);
  color:var(--muted3); border-radius:9px; padding:6px 13px;
  font-size:12px; cursor:pointer; transition:all 0.2s;
  font-family:'DM Sans',sans-serif; display:flex; align-items:center; gap:6px;
  letter-spacing:0.2px;
}
.top-action-btn:hover { border-color:var(--cyan); color:var(--cyan); background:rgba(96,165,250,0.06); }

/* MESSAGES */
.messages-wrap {
  flex:1; overflow-y:auto; padding:28px 32px;
  display:flex; flex-direction:column; gap:22px;
}

.welcome-state {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  text-align:center; padding:40px; gap:20px;
}
.welcome-logo {
  width:80px; height:80px;
  background:linear-gradient(135deg, #0A1628, #162544);
  border:1.5px solid rgba(96,165,250,0.25);
  border-radius:24px;
  display:flex; align-items:center; justify-content:center;
  font-size:40px; margin-bottom:8px;
  box-shadow:0 0 50px rgba(96,165,250,0.12);
  animation:logoPulse 3s ease-in-out infinite alternate;
}
@keyframes logoPulse { 0%{box-shadow:0 0 20px rgba(96,165,250,0.08)} 100%{box-shadow:0 0 60px rgba(96,165,250,0.22)} }
.welcome-title { font-family:'Cinzel',serif; font-size:22px; font-weight:700; letter-spacing:2px; color:var(--white); }
.welcome-sub { font-size:14px; color:var(--muted3); max-width:400px; line-height:1.7; }
.welcome-chips { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:12px; }
.welcome-chip {
  font-size:12.5px; padding:8px 16px;
  background:var(--card2); border:1px solid var(--border);
  border-radius:99px; color:var(--muted3); cursor:pointer; transition:all 0.2s;
}
.welcome-chip:hover { border-color:var(--cyan); color:var(--cyan); background:rgba(96,165,250,0.07); }

.msg-row { display:flex; gap:12px; animation:fadeUp 0.3s ease; max-width:900px; }
.msg-row.user { flex-direction:row-reverse; margin-left:auto; }
.msg-row.ai { margin-right:auto; }

.msg-avatar {
  width:34px; height:34px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-size:15px; flex-shrink:0; font-weight:700; margin-top:2px;
}
.msg-avatar.ai {
  background:linear-gradient(135deg, #0D1F40, #152D5C);
  border:1px solid rgba(96,165,250,0.25); color:var(--cyan3); font-size:14px;
}
.msg-avatar.user {
  background:linear-gradient(135deg, #2D1F00, #4A3410);
  border:1px solid rgba(251,191,36,0.25); color:var(--gold);
}

.msg-content { display:flex; flex-direction:column; gap:4px; max-width:72%; }
.msg-bubble {
  padding:13px 17px; border-radius:16px; font-size:14px; line-height:1.75;
  word-break:break-word;
}
.msg-bubble.ai {
  background:var(--card); border:1px solid var(--border);
  border-top-left-radius:4px; color:var(--white);
}
.msg-bubble.user {
  background:linear-gradient(135deg, rgba(59,130,246,0.14), rgba(96,165,250,0.08));
  border:1px solid rgba(96,165,250,0.18);
  border-top-right-radius:4px; color:var(--white);
}
.msg-meta { font-size:10.5px; color:var(--muted); padding:0 4px; }
.msg-row.user .msg-meta { text-align:right; }

.msg-sources { margin-top:10px; padding-top:10px; border-top:1px solid var(--border); }
.sources-label { font-size:10.5px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }
.source-tags { display:flex; flex-wrap:wrap; gap:5px; }
.source-tag {
  display:inline-flex; align-items:center; gap:5px;
  background:rgba(96,165,250,0.07); border:1px solid rgba(96,165,250,0.15);
  border-radius:7px; padding:3px 9px;
  font-size:11px; color:var(--cyan3);
  text-decoration:none; transition:all 0.2s;
}
.source-tag:hover { background:rgba(96,165,250,0.13); border-color:var(--cyan); }

.typing-indicator { display:flex; gap:5px; align-items:center; padding:6px 2px; }
.typing-dot {
  width:6px; height:6px; border-radius:50%;
  background:var(--cyan3); opacity:0.35;
  animation:typingBounce 1.3s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay:0.18s; }
.typing-dot:nth-child(3) { animation-delay:0.36s; }
@keyframes typingBounce { 0%,60%,100%{transform:translateY(0);opacity:0.35} 30%{transform:translateY(-7px);opacity:1} }

/* INPUT */
.input-area {
  border-top:1px solid var(--border);
  padding:16px 24px 20px;
  background:rgba(3,4,7,0.85);
  backdrop-filter:blur(16px);
  flex-shrink:0;
}

.upload-bar {
  display:none; align-items:center; gap:10px;
  background:rgba(96,165,250,0.05); border:1px dashed rgba(96,165,250,0.2);
  border-radius:11px; padding:10px 14px; margin-bottom:12px;
  cursor:pointer; position:relative; transition:all 0.2s;
}
.upload-bar.show { display:flex; }
.upload-bar:hover { background:rgba(96,165,250,0.09); border-color:var(--cyan); }
.upload-bar input { position:absolute; inset:0; opacity:0; cursor:pointer; }
.upload-icon { font-size:18px; }
.upload-text { font-size:13px; color:var(--muted3); flex:1; }
.upload-text b { color:var(--cyan); }
.upload-filename {
  display:none; font-size:12px;
  background:rgba(96,165,250,0.1); border:1px solid rgba(96,165,250,0.2);
  border-radius:6px; padding:3px 10px; color:var(--cyan3);
}

.input-row { display:flex; gap:10px; align-items:flex-end; }
.input-wrap { flex:1; position:relative; }
.chat-input {
  width:100%; background:var(--card);
  border:1px solid var(--border); border-radius:14px;
  padding:14px 50px 14px 18px;
  color:var(--white); font-size:14px;
  font-family:'DM Sans',sans-serif; outline:none;
  resize:none; max-height:130px; min-height:50px;
  transition:border 0.2s, box-shadow 0.2s; line-height:1.55;
}
.chat-input:focus { border-color:rgba(96,165,250,0.4); box-shadow:0 0 0 3px rgba(96,165,250,0.07); }
.chat-input::placeholder { color:var(--muted); }

.input-tool-btn {
  position:absolute; right:14px; bottom:13px;
  background:none; border:none; color:var(--muted2);
  cursor:pointer; font-size:17px; transition:all 0.2s; padding:0; line-height:1;
}
.input-tool-btn:hover { color:var(--cyan3); }
