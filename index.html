<script>
const SYS='Tu VasuKi hai — ek friendly aur smart AI study assistant. Tu Hinglish mein baat karta hai. Students ki padhai mein madad karta hai. Concepts clearly explain karta hai, math step-by-step solve karta hai, hamesha encourage karta hai.';
let hist=[],cnt=0,busy=false;

function showChat(){
  document.getElementById('landing').style.display='none';
  document.getElementById('chat').style.display='flex';
  document.getElementById('inp').focus();
}

function showLanding(){
  document.getElementById('chat').style.display='none';
  document.getElementById('landing').style.display='flex';
}

function hk(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
function ar(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px';}
function useSug(b){document.getElementById('inp').value=b.innerText.trim();send();}

function hw(){
  const w=document.getElementById('welcome');
  if(w)w.style.display='none';
}

function addMsg(role,text){
  hw();
  const list=document.getElementById('mlist');
  const d=document.createElement('div');d.className='m '+role;
  const a=document.createElement('div');a.className='av '+role;a.textContent=role==='ai'?'🐍':'😊';
  const b=document.createElement('div');b.className='bbl';b.innerHTML=fmt(text);
  d.appendChild(a);d.appendChild(b);list.appendChild(d);
  sb();
}

function fmt(t){
  t=t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/`([^`]+)`/g,'<code style="background:rgba(255,123,44,0.1);border-radius:4px;padding:1px 5px;font-size:12px;color:#00e5cc">$1</code>');
  t=t.replace(/\n/g,'<br>');
  return t;
}

function showTyping(){
  hw();
  const list=document.getElementById('mlist');
  const d=document.createElement('div');d.className='m ai';d.id='typ';
  const a=document.createElement('div');a.className='av ai';a.textContent='🐍';
  const b=document.createElement('div');b.className='bbl';
  b.innerHTML='<div class="td"><span></span><span></span><span></span></div>';
  d.appendChild(a);d.appendChild(b);list.appendChild(d);sb();
}

function removeTyping(){const t=document.getElementById('typ');if(t)t.remove();}
function sb(){const c=document.getElementById('msgs');setTimeout(()=>c.scrollTop=c.scrollHeight,50);}

async function send(){
  const inp=document.getElementById('inp');
  const text=inp.value.trim();
  if(!text||busy)return;
  if(cnt>=20){alert('20 free messages khatam! Premium lo sirf ₹49/month!');showLanding();return;}

  inp.value='';inp.style.height='auto';
  busy=true;document.getElementById('sb').disabled=true;
  cnt++;document.getElementById('mc').textContent=cnt;

  addMsg('u',text);
  showTyping();

  try{
    const r=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:text})
    });

    const data=await r.json();

    removeTyping();
    addMsg('ai',data.reply);

  }catch(e){
    removeTyping();
    addMsg('ai','❌ Server error aaya');
    cnt--;document.getElementById('mc').textContent=cnt;
  }

  busy=false;
  document.getElementById('sb').disabled=false;
  document.getElementById('inp').focus();
}
</script>
