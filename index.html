<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VasuKi AI — Apna Smart Study Buddy</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060818;
  --surface: #0e1225;
  --surface2: #161b30;
  --border: #1f2845;
  --orange: #ff7b2c;
  --orange2: #ffaa5c;
  --teal: #00e5cc;
  --text: #e2e8ff;
  --muted: #4a5480;
  --white: #ffffff;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { background:var(--bg); color:var(--text); font-family:'Nunito',sans-serif; overflow-x:hidden; }
body::before { content:''; position:fixed; inset:0; background: radial-gradient(ellipse 70% 50% at 10% 0%,rgba(255,123,44,0.08) 0%,transparent 60%), radial-gradient(ellipse 50% 60% at 90% 100%,rgba(59,139,255,0.07) 0%,transparent 60%); pointer-events:none; z-index:0; }
.page { display:none; min-height:100vh; position:relative; z-index:1; }
.page.active { display:flex; flex-direction:column; }
nav { display:flex; align-items:center; justify-content:space-between; padding:18px 40px; position:sticky; top:0; z-index:100; background:rgba(6,8,24,0.85); backdrop-filter:blur(20px); border-bottom:1px solid rgba(255,123,44,0.1); }
.logo { display:flex; align-items:center; gap:12px; text-decoration:none; }
.logo-svg { width:42px; height:42px; filter:drop-shadow(0 0 12px rgba(255,123,44,0.5)); animation:logoFloat 3s ease-in-out infinite; }
@keyframes logoFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
.logo-name { font-family:'Cinzel',serif; font-size:22px; font-weight:900; letter-spacing:2px; background:linear-gradient(90deg,var(--orange),var(--orange2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.logo-tag { font-size:9px; font-weight:700; letter-spacing:2px; color:var(--teal); background:rgba(0,229,204,0.1); border:1px solid rgba(0,229,204,0.3); border-radius:4px; padding:2px 6px; margin-left:4px; }
.nav-btn { background:linear-gradient(135deg,var(--orange),#e05500); color:white; border:none; border-radius:12px; padding:10px 24px; font-family:'Nunito',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:all 0.2s; box-shadow:0 4px 16px rgba(255,123,44,0.3); }
.nav-btn:hover { transform:translateY(-2px); }
.hero { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:80px 24px 60px; gap:28px; }
.hero-logo { position:relative; display:inline-block; margin-bottom:8px; }
.hero-logo-svg { width:100px; height:100px; filter:drop-shadow(0 0 30px rgba(255,123,44,0.6)); animation:heroPulse 2.5s ease-in-out infinite; }
@keyframes heroPulse { 0%,100%{filter:drop-shadow(0 0 30px rgba(255,123,44,0.6));transform:scale(1)} 50%{filter:drop-shadow(0 0 50px rgba(255,123,44,0.9));transform:scale(1.05)} }
.hero-ring { position:absolute; inset:-16px; border-radius:50%; border:2px solid rgba(255,123,44,0.2); animation:ringRotate 8s linear infinite; }
.hero-ring::after { content:''; position:absolute; top:-4px; left:50%; transform:translateX(-50%); width:8px; height:8px; border-radius:50%; background:var(--orange); box-shadow:0 0 12px var(--orange); }
@keyframes ringRotate { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
.hero h1 { font-family:'Cinzel',serif; font-size:clamp(36px,7vw,68px); font-weight:900; letter-spacing:4px; line-height:1.1; background:linear-gradient(135deg,var(--orange),var(--orange2),#fff5e0); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.hero-sub { font-size:clamp(16px,2.5vw,22px); color:var(--muted); font-weight:400; max-width:500px; line-height:1.6; }
.hero-sub span { color:var(--teal); font-weight:600; }
.hero-btns { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
.btn-main { background:linear-gradient(135deg,var(--orange),#e05500); color:white; border:none; border-radius:14px; padding:14px 36px; font-family:'Nunito',sans-serif; font-size:16px; font-weight:800; cursor:pointer; transition:all 0.2s; box-shadow:0 8px 28px rgba(255,123,44,0.35); }
.btn-main:hover { transform:translateY(-3px); }
.btn-outline { background:transparent; color:var(--text); border:1.5px solid var(--border); border-radius:14px; padding:14px 36px; font-family:'Nunito',sans-serif; font-size:16px; font-weight:700; cursor:pointer; transition:all 0.2s; }
.btn-outline:hover { border-color:var(--orange); color:var(--orange); }
.features { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; padding:0 40px 80px; max-width:900px; margin:0 auto; width:100%; }
.feature-card { background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:24px; transition:all 0.2s; }
.feature-card:hover { border-color:rgba(255,123,44,0.3); transform:translateY(-4px); }
.feature-icon { font-size:32px; margin-bottom:12px; }
.feature-title { font-size:15px; font-weight:700; color:var(--white); margin-bottom:6px; }
.feature-desc { font-size:13px; color:var(--muted); line-height:1.5; }
.section-title { text-align:center; font-family:'Cinzel',serif; font-size:clamp(22px,4vw,32px); font-weight:700; color:var(--white); padding:20px 0 8px; letter-spacing:2px; }
.section-sub { text-align:center; color:var(--muted); font-size:14px; margin-bottom:32px; }
.pricing { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:16px; padding:0 40px 80px; max-width:600px; margin:0 auto; width:100%; }
.plan-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:28px 24px; text-align:center; position:relative; transition:all 0.2s; }
.plan-card.premium { border-color:rgba(255,123,44,0.4); background:linear-gradient(135deg,rgba(255,123,44,0.05),var(--surface)); box-shadow:0 0 40px rgba(255,123,44,0.1); }
.plan-badge { position:absolute; top:-12px; left:50%; transform:translateX(-50%); background:linear-gradient(135deg,var(--orange),#e05500); color:white; font-size:11px; font-weight:800; padding:4px 14px; border-radius:20px; }
.plan-name { font-family:'Cinzel',serif; font-size:18px; font-weight:700; color:var(--white); margin-bottom:8px; }
.plan-price { font-size:36px; font-weight:800; color:var(--orange); margin:12px 0; }
.plan-price span { font-size:14px; color:var(--muted); font-weight:400; }
.plan-features { list-style:none; text-align:left; margin:16px 0 24px; }
.plan-features li { font-size:13px; color:var(--text); padding:5px 0; display:flex; align-items:center; gap:8px; }
.plan-features li::before { content:'✓'; color:var(--teal); font-weight:800; }
.plan-features li.no::before { content:'✗'; color:var(--muted); }
.plan-features li.no { color:var(--muted); }
.plan-btn { width:100%; padding:12px; border-radius:12px; font-family:'Nunito',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:all 0.2s; border:none; }
.plan-btn.free { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
.plan-btn.paid { background:linear-gradient(135deg,var(--orange),#e05500); color:white; }
footer { text-align:center; padding:24px; color:var(--muted); font-size:12px; border-top:1px solid var(--border); }
#chat-page { height:100vh; overflow:hidden; }
.chat-nav { display:flex; align-items:center; justify-content:space-between; padding:14px 24px; background:rgba(6,8,24,0.9); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); flex-shrink:0; }
.chat-logo { display:flex; align-items:center; gap:10px; }
.chat-logo-svg { width:32px; height:32px; filter:drop-shadow(0 0 8px rgba(255,123,44,0.5)); }
.chat-logo-name { font-family:'Cinzel',serif; font-size:18px; font-weight:900; letter-spacing:2px; background:linear-gradient(90deg,var(--orange),var(--orange2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.online-badge { display:flex; align-items:center; gap:6px; background:rgba(0,229,204,0.08); border:1px solid rgba(0,229,204,0.2); border-radius:20px; padding:5px 12px; font-size:12px; color:var(--teal); font-weight:600; }
.online-dot { width:6px; height:6px; border-radius:50%; background:var(--teal); animation:blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.back-btn { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:7px 14px; color:var(--text); font-family:'Nunito',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; }
.back-btn:hover { border-color:var(--orange); color:var(--orange); }
#chat-messages { flex:1; overflow-y:auto; padding:20px 16px; scroll-behavior:smooth; }
#chat-messages::-webkit-scrollbar { width:4px; }
#chat-messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
#chat-welcome { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:50vh; text-align:center; gap:16px; padding:20px; }
.welcome-logo-svg { width:72px; height:72px; filter:drop-shadow(0 0 20px rgba(255,123,44,0.6)); animation:heroPulse 2.5s ease-in-out infinite; }
#chat-welcome h2 { font-family:'Cinzel',serif; font-size:clamp(20px,4vw,28px); font-weight:900; letter-spacing:2px; background:linear-gradient(90deg,var(--orange),var(--orange2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
#chat-welcome p { color:var(--muted); font-size:14px; max-width:380px; line-height:1.6; }
.suggestions { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; max-width:460px; width:100%; margin-top:8px; }
.sug-btn { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px 14px; color:var(--text); font-family:'Nunito',sans-serif; font-size:12px; cursor:pointer; text-align:left; transition:all 0.2s; line-height:1.4; }
.sug-btn:hover { border-color:rgba(255,123,44,0.4); transform:translateY(-2px); }
.sug-btn .si { display:block; font-size:18px; margin-bottom:4px; }
#messages-list { display:flex; flex-direction:column; gap:16px; max-width:800px; margin:0 auto; }
.msg { display:flex; gap:10px; animation:msgPop 0.3s ease; }
@keyframes msgPop { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
.msg.user { flex-direction:row-reverse; }
.msg-avatar { width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; margin-top:2px; }
.msg-avatar.ai { background:linear-gradient(135deg,var(--orange),#c94400); box-shadow:0 0 12px rgba(255,123,44,0.3); }
.msg-avatar.user { background:var(--surface2); border:1px solid var(--border); }
.msg-bubble { padding:12px 16px; border-radius:16px; font-size:14px; line-height:1.65; max-width:calc(100% - 46px); }
.msg.ai .msg-bubble { background:var(--surface); border:1px solid var(--border); border-top-left-radius:4px; }
.msg.user .msg-bubble { background:rgba(255,123,44,0.1); border:1px solid rgba(255,123,44,0.2); border-top-right-radius:4px; }
.msg-bubble strong { color:var(--orange2); }
.msg-bubble code { background:rgba(255,123,44,0.1); border-radius:5px; padding:1px 6px; font-size:12px; font-family:monospace; color:var(--teal); }
.typing-dots { display:flex; gap:4px; padding:4px 0; }
.typing-dots span { width:6px; height:6px; border-radius:50%; background:var(--orange); animation:dot 1.4s infinite; }
.typing-dots span:nth-child(2){animation-delay:0.2s} .typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes dot { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-5px);opacity:1} }
#chat-input-area { padding:14px 16px 18px; background:rgba(6,8,24,0.9); backdrop-filter:blur(20px); border-top:1px solid var(--border); flex-shrink:0; }
.limit-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; padding:0 4px; }
.limit-text { font-size:11px; color:var(--muted); }
.limit-text span { color:var(--orange); font-weight:700; }
.upgrade-link { font-size:11px; color:var(--teal); cursor:pointer; font-weight:600; text-decoration:underline; }
.input-row { display:flex; gap:10px; align-items:flex-end; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:10px 14px; max-width:800px; margin:0 auto; transition:border-color 0.2s; }
.input-row:focus-within { border-color:rgba(255,123,44,0.4); }
#msg-input { flex:1; background:none; border:none; outline:none; color:var(--text); font-family:'Nunito',sans-serif; font-size:14px; resize:none; max-height:120px; line-height:1.5; min-height:22px; }
#msg-input::placeholder { color:var(--muted); }
#send-btn { width:36px; height:36px; border-radius:10px; background:linear-gradient(135deg,var(--orange),#c94400); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; flex-shrink:0; }
#send-btn:hover:not(:disabled){transform:scale(1.08)} #send-btn:disabled{opacity:0.4;cursor:not-allowed}
#send-btn svg { width:15px; height:15px; fill:white; }
.input-footer { text-align:center; font-size:11px; color:var(--muted); margin-top:8px; }
#api-modal { position:fixed; inset:0; z-index:999; background:rgba(6,8,24,0.96); backdrop-filter:blur(24px); display:flex; align-items:center; justify-content:center; padding:20px; }
.modal-card { background:var(--surface); border:1px solid var(--border); border-radius:24px; padding:36px 32px; max-width:440px; width:100%; text-align:center; box-shadow:0 40px 80px rgba(0,0,0,0.6); }
.modal-logo-svg { width:60px; height:60px; margin-bottom:16px; filter:drop-shadow(0 0 20px rgba(255,123,44,0.5)); animation:heroPulse 2.5s ease-in-out infinite; }
.modal-card h2 { font-family:'Cinzel',serif; font-size:24px; font-weight:900; letter-spacing:2px; background:linear-gradient(90deg,var(--orange),var(--orange2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px; }
.modal-card p { color:var(--muted); font-size:13px; line-height:1.6; margin-bottom:24px; }
.modal-card p a { color:var(--teal); text-decoration:none; font-weight:600; }
.api-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:12px 16px; color:var(--text); font-family:'Nunito',sans-serif; font-size:13px; outline:none; transition:border-color 0.2s; margin-bottom:12px; }
.api-input:focus { border-color:var(--orange); }
.api-input::placeholder { color:var(--muted); }
.modal-btn { width:100%; background:linear-gradient(135deg,var(--orange),#c94400); border:none; border-radius:12px; padding:13px; color:white; font-family:'Nunito',sans-serif; font-size:15px; font-weight:800; cursor:pointer; transition:all 0.2s; }
.modal-btn:hover { transform:translateY(-2px); }
.modal-note { margin-top:14px; font-size:11px; color:var(--muted); }
@media(max-width:600px) { nav{padding:14px 16px} .hero{padding:70px 16px 40px} .features,.pricing{padding:0 16px 60px} .suggestions{grid-template-columns:1fr} .modal-card{padding:28px 20px} }
</style>
</head>
